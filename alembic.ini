[alembic]
# Path to migration scripts (relative to this file)
script_location = alembic

# File naming for new revisions
file_template = %%(rev)s_%%(slug)s

# Make sure Python can find backend/
prepend_sys_path = .

# Truncate long revision slugs
truncate_slug_length = 40

# Timezone for revision timestamps
timezone = UTC

# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
